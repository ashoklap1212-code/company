<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>

    <style>
        body {
            font-family: Poppins;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        
        .login-box {
            background: #111827;
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h2>Admin Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

    </div>

    <script>
        function login() {

            let username = document.getElementById("username").value
            let password = document.getElementById("password").value

            if (username === "admin" && password === "12345") {

                localStorage.setItem("adminLogin", "true")

                window.location.href = "admin.html"

            } else {

                alert("Wrong Username or Password")

            }

        }
    </script>

</body>

</html>
